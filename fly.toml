app = "plaud-notes-mcp"
primary_region = "iad"

[build]

[env]
  PLAUD_TRANSPORT = "http"
  PLAUD_MCP_HOST = "0.0.0.0"
  PLAUD_MCP_PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
